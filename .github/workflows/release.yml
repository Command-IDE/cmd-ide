name: Release Build

on:
  release:
    types:
      - published

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      GOCACHE: ${{ github.workspace }}\.cache\go-build

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: app/go.mod
          cache-dependency-path: app/go.sum

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          $goBin = Join-Path (go env GOPATH) 'bin'
          $goBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build release binaries
        run: ./build.ps1

      - name: Verify build outputs
        run: |
          $expected = @(
            'app/build/bin/cmdIDE-windows-amd64.exe',
            'app/build/bin/cmdIDE-plugins-windows-amd64.exe',
            'app/build/bin/cmdIDE-installer-windows.exe'
          )
          foreach ($path in $expected) {
            if (-not (Test-Path $path)) { throw "Missing expected build output: $path" }
          }

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cmdIDE-${{ github.event.release.tag_name }}-windows
          if-no-files-found: error
          path: |
            app/build/bin/cmdIDE-windows-amd64.exe
            app/build/bin/cmdIDE-plugins-windows-amd64.exe
            app/build/bin/cmdIDE-installer-windows.exe

      - name: Upload binaries to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" `
            "app/build/bin/cmdIDE-windows-amd64.exe#cmdIDE-windows-amd64.exe" `
            "app/build/bin/cmdIDE-plugins-windows-amd64.exe#cmdIDE-plugins-windows-amd64.exe" `
            "app/build/bin/cmdIDE-installer-windows.exe#cmdIDE-installer-windows.exe" `
            --clobber

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 60

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: app/go.mod
          cache-dependency-path: app/go.sum

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          $goBin = Join-Path (go env GOPATH) 'bin'
          $goBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build release binaries
        run: pwsh ./build.ps1

      - name: Verify build outputs
        run: |
          $expected = @(
            'app/build/bin/cmdIDE-darwin-arm64.zip',
            'app/build/bin/cmdIDE-plugins-darwin-arm64.zip',
            'app/build/bin/cmdIDE-installer-darwin'
          )
          foreach ($path in $expected) {
            if (-not (Test-Path $path)) { throw "Missing expected build output: $path" }
          }

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cmdIDE-${{ github.event.release.tag_name }}-macos
          if-no-files-found: error
          path: |
            app/build/bin/cmdIDE-darwin-arm64.zip
            app/build/bin/cmdIDE-plugins-darwin-arm64.zip
            app/build/bin/cmdIDE-installer-darwin

      - name: Upload binaries to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "app/build/bin/cmdIDE-darwin-arm64.zip#cmdIDE-darwin-arm64.zip" \
            "app/build/bin/cmdIDE-plugins-darwin-arm64.zip#cmdIDE-plugins-darwin-arm64.zip" \
            "app/build/bin/cmdIDE-installer-darwin#cmdIDE-installer-darwin" \
            --clobber

  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: app/go.mod
          cache-dependency-path: app/go.sum

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          $goBin = Join-Path (go env GOPATH) 'bin'
          $goBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build release binaries
        run: pwsh ./build.ps1

      - name: Verify build outputs
        run: |
          $expected = @(
            'app/build/bin/cmdIDE-linux-amd64',
            'app/build/bin/cmdIDE-plugins-linux-amd64',
            'app/build/bin/cmdIDE-installer-linux'
          )
          foreach ($path in $expected) {
            if (-not (Test-Path $path)) { throw "Missing expected build output: $path" }
          }

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cmdIDE-${{ github.event.release.tag_name }}-linux
          if-no-files-found: error
          path: |
            app/build/bin/cmdIDE-linux-amd64
            app/build/bin/cmdIDE-plugins-linux-amd64
            app/build/bin/cmdIDE-installer-linux

      - name: Upload binaries to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "app/build/bin/cmdIDE-linux-amd64#cmdIDE-linux-amd64" \
            "app/build/bin/cmdIDE-plugins-linux-amd64#cmdIDE-plugins-linux-amd64" \
            "app/build/bin/cmdIDE-installer-linux#cmdIDE-installer-linux" \
            --clobber
